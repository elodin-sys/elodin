[package]
name = "falcon9-fsw"
license = "MIT OR Apache-2.0"
edition = "2024"
version = "0.1.0"
description = "Falcon 9 booster flight software for the Elodin SITL example"
publish = false

[package.metadata.dist]
dist = false

[[bin]]
name = "falcon9-fsw"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[workspace]
