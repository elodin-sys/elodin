# Minimal mediamtx config for the RTSP ingest demo.
# The "test" path self-publishes an H.264 baseline pattern via ffmpeg on init,
# so the fake camera is a single process (no separate ffmpeg terminal).
paths:
  test:
    runOnInit: >
      ffmpeg -hide_banner -loglevel warning -re
      -f lavfi -i testsrc=size=1280x720:rate=30
      -c:v libx264 -profile:v baseline -tune zerolatency -pix_fmt yuv420p -g 30
      -f rtsp -rtsp_transport tcp rtsp://localhost:$RTSP_PORT/$MTX_PATH
    runOnInitRestart: yes
