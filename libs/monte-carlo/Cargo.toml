[package]
name = "monte-carlo"
license = "MIT OR Apache-2.0"
edition = "2024"
version.workspace = true
repository.workspace = true
authors = ["sascha@elodin.systems", "akhil@elodin.systems", "van@elodin.systems"]
publish = false

[dependencies]
chrono = { version = "0.4.33", features = ["serde"] }
csv = "1.3"
glob = "0.3"
indicatif = "0.17"
miette = { version = "7.2", features = ["fancy"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
s10.path = "../s10"
stellarator.path = "../stellarator"
sysinfo = { version = "0.34", default-features = false, features = ["system"] }
thiserror = { version = "2.0", default-features = false }
tokio = { version = "1.40.0", features = ["full"] }
toml = "0.8"

[target.'cfg(unix)'.dependencies]
nix = { version = "0.29", features = ["fs", "resource", "signal"] }

[dev-dependencies]
tempfile = "3"
