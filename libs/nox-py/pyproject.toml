[build-system]
requires = ["maturin>=1.4,<2.0"]
build-backend = "maturin"

[project]
name = "elodin"
requires-python = ">=3.13"
classifiers = [
    "Programming Language :: Rust",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Python :: Implementation :: PyPy",
]
dependencies = [
    "jax==0.8.1",
    "numpy",
    "typing-extensions",
    "polars",
    "pytest",
    "matplotlib",
]
dynamic = ["version"]

[project.optional-dependencies]
tests = ["pytest"]
# Install for backend="jax-gpu" on Linux. Omit to avoid CUDA plugin init when using Cranelift only.
cuda = ["jax-cuda12-plugin[with-cuda]==0.8.1; sys_platform == 'linux'"]
dynamic = []

[tool.maturin]
python-source = "python"
features = ["publish"]

[tool.pytest.ini_options]
pythonpath = [
  "python",
]

[project.entry-points.pytest11]
elodin = "elodin"
