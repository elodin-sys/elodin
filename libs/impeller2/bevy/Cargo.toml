[package]
name = "impeller2-bevy"
license = "MIT OR Apache-2.0"
version.workspace = true
edition = "2024"

[features]
default = ["tcp"]
tcp = ["stellarator", "impeller2-stellar"]

[dependencies]
impeller2.path = ".."
impeller2.features = ["bevy", "std", "thingbuf"]
impeller2-wkt.path = "../wkt"
impeller2-wkt.features = ["gui", "bevy"]
nox.path = "../../nox"

# bevy
bevy.workspace = true
#bevy.features = ["bevy-asset"]

# channels
thingbuf = "0.1.6"
impeller2-bbq.path = "../bbq"
bbqueue.git = "https://github.com/elodin-sys/bbqueue.git"
bbqueue.rev = "9d11b52fb944f1bd67c80f3f38af1376ebb7efe3"
bbqueue.features = ["std", "maitake-sync-0_3"]
bbqueue.default-features = false
stellarator-buf.path = "../../stellarator/buf"

# async
stellarator.path = "../../stellarator"
stellarator.optional = true
stellarator.features = ["miette"]
impeller2-stellar.path = "../stellar"
impeller2-stellar.features = ["queue"]
impeller2-stellar.optional = true
futures-lite = "2.5.0"

# helpers
smallvec.version = "1.11.2"
compact_str = "0.9"
tracing = "0.1"

# error
miette.version = "7.2"
miette.features = ["fancy-no-syscall"]

# rand
fastrand = "2.2"

# serde
serde.version = "1.0"
postcard.version = "1.0.8"
postcard.features = ["alloc"]
